    <form onsubmit="updateNumeric(event, '{{ question.id }}')">

        {% csrf_token %}
        {% bootstrap_form question.numeric_form %}

        <button class="btn btn-sm btn-primary">
            Update Answer
        </button>
    </form>
</div>
